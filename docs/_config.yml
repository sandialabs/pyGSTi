# Book settings
# Learn more at https://jupyterbook.org/customize/config.html

title: PyGSTi Documentation
author: PyGSTi Developers
# Logo is configured below (sphinx html_theme_options.logo) so we can serve a
# dark-content variant in light mode and the white variant in dark mode.

# Cache executed notebooks between builds.
# See https://jupyterbook.org/content/execute.html
execute:
  execute_notebooks: 'off'

# Define the name of the latex output file for PDF builds
latex:
  latex_documents:
    targetname: pygsti-docs.tex

# Add a bibtex file so that we can create citations
bibtex_bibfiles:
  - references.bib

# MyST Markdown parser extensions
parse:
  myst_enable_extensions:
    - dollarmath
    - amsmath
    - substitution

# Information about where the book exists on the web
repository:
  url: https://github.com/sandialabs/pyGSTi  # Online location of your book
  path_to_book: docs  # Optional path to your book, relative to the repository root
  branch: develop  # Which branch of the repository should be used when creating links (optional)

# Add GitHub buttons to your book
# See https://jupyterbook.org/customize/config.html#add-a-link-to-your-repository
html:
  use_issues_button: true
  use_repository_button: true
  home_page_in_navbar: false

# Interactive notebook interface
launch_buttons:
  notebook_interface: "jupyterlab"
  binderhub_url: "https://mybinder.org"
  colab_url: "https://colab.research.google.com"

# Sphinx options
sphinx:
  # Merge the settings below into Jupyter Book's generated config recursively,
  # so html_theme_options.logo is added without clobbering the repository /
  # launch-button options JB derives from the keys above.
  recursive_update: true
  # Local extension that stamps the installed pyGSTi version (read at build time
  # from package metadata) into the MyST substitution {{ pygsti_version }}.
  local_extensions:
    pygsti_version_sub: _ext
  extra_extensions:
  - 'sphinx.ext.napoleon'
  - 'sphinx.ext.autodoc'
  - 'sphinx.ext.autosummary'
  - 'sphinx.ext.doctest'
  - 'sphinx.ext.intersphinx'
  - 'sphinx.ext.mathjax'
  config:
    add_module_names: False
    # Light/dark logo: in light mode show the dark-content logo (legible on a
    # light background); in dark mode show the white-content logo. Files live in
    # docs/_static, which JB adds to html_static_path automatically.
    html_theme_options:
      logo:
        image_light: pyGSTi_icon_blk.png
        image_dark: pyGSTi_icon_wht.png
    autosummary_generate: True
    autoclass_content: "both"
    autodoc_typehints: "description"
    autodoc_member_order: "groupwise"
    # Trim heavy / low-value autodoc subtrees from the hosted build. Each glob
    # drops the generated stubs (autosummary still writes them; they just aren't
    # read/rendered). A handful of public symbols from these areas are kept and
    # documented individually via the "Selected API" block in api.rst.
    #   - pygsti.report.*            ~315 pages of HTML-report generation machinery
    #   - pygsti.modelpacks.*        ~85 pages of standard model packs (data, not API)
    #   - pygsti.drivers.longsequence  the longsequence driver module + its functions
    #   - pygsti.evotypes.*          ~191 pages of internal evolution-type rep machinery
    exclude_patterns:
    - "notebooks/"
    - "**/*.ipynb"
    - "_autosummary/pygsti.report.*"
    - "_autosummary/pygsti.modelpacks.*"
    - "_autosummary/pygsti.drivers.longsequence*"
    - "_autosummary/pygsti.evotypes.*"
    suppress_warnings:
    - "etoc.toctree"
    - "myst.xref_missing"
    templates_path: ["_templates"]
